<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Abdul Lateef</title>
    <style>
        /* إعدادات الخلفية - أسود باهت */
        body {
            background-color: #121212; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            display: flex;
            gap: 10px;
        }

        /* إعدادات الحروف ولونها السماوي */
        .letter {
            font-size: 4rem;
            font-weight: bold;
            color: #00d4ff; /* أزرق سماوي متناسق */
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            display: inline-block;
            opacity: 0;
            transform: translateY(-100vh) rotateY(180deg); /* تبدأ من الأعلى مع قلب */
            animation: flipIn 1.5s ease-out forwards;
        }

        /* حركة التقلب والاستقرار في المنتصف */
        @keyframes flipIn {
            0% {
                transform: translateY(-100vh) rotateY(0deg);
                opacity: 0;
            }
            60% {
                transform: translateY(20px) rotateY(540deg); /* تقلب أثناء النزول */
                opacity: 1;
            }
            100% {
                transform: translateY(0) rotateY(720deg); /* الاستقرار */
                opacity: 1;
            }
        }

        /* تأخير دخول كل حرف ليعطي شكل متتابع */
        .letter:nth-child(1) { animation-delay: 0.1s; }
        .letter:nth-child(2) { animation-delay: 0.2s; }
        .letter:nth-child(3) { animation-delay: 0.3s; }
        .letter:nth-child(4) { animation-delay: 0.4s; }
        .letter:nth-child(5) { animation-delay: 0.5s; }
        /* مسافة بين الاسمين */
        .space { width: 20px; }
        .letter:nth-child(7) { animation-delay: 0.6s; }
        .letter:nth-child(8) { animation-delay: 0.7s; }
        .letter:nth-child(9) { animation-delay: 0.8s; }
        .letter:nth-child(10) { animation-delay: 0.9s; }
        .letter:nth-child(11) { animation-delay: 1.0s; }
        /* مسافة ثانية */
        .letter:nth-child(13) { animation-delay: 1.1s; }
        .letter:nth-child(14) { animation-delay: 1.2s; }
        .letter:nth-child(15) { animation-delay: 1.3s; }
        .letter:nth-child(16) { animation-delay: 1.4s; }
        .letter:nth-child(17) { animation-delay: 1.5s; }
        .letter:nth-child(18) { animation-delay: 1.6s; }
    </style>
</head>
<body>

    <div class="container">
        <span class="letter">A</span>
        <span class="letter">h</span>
        <span class="letter">m</span>
        <span class="letter">e</span>
        <span class="letter">d</span>
        
        <div class="space"></div>

        <span class="letter">A</span>
        <span class="letter">b</span>
        <span class="letter">d</span>
        <span class="letter">u</span>
        <span class="letter">l</span>

        <div class="space"></div>

        <span class="letter">L</span>
        <span class="letter">a</span>
        <span class="letter">t</span>
        <span class="letter">e</span>
        <span class="letter">e</span>
        <span class="letter">f</span>
    </div>

</body>
</html>
